name: Render Video

on:
  push:
    branches:
      - main

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Render video
        run: npx remotion render src/index.ts MyComp out/video.mp4

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: video
          path: out/video.mp4
